name: Deploy job-search-web

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag (defaults to git SHA)
        required: false
        type: string

  push:
    branches: [master]
    paths:
      - "services/job-search-web/**"
      - ".github/workflows/deploy-job-search-web.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  NAMESPACE: job-search

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push job-search-web
        uses: docker/build-push-action@v6
        with:
          context: ./services/job-search-web
          file: ./services/job-search-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/job-search-web:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/job-search-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"

          if [ -z "$KUBE_CONFIG_DATA" ] && [ -f "$HOME/.kube/config" ]; then
            echo "Using existing kubeconfig on self-hosted runner"
          elif [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "::error::KUBE_CONFIG secret is empty and no ~/.kube/config on runner."
            exit 1
          elif printf '%s' "$KUBE_CONFIG_DATA" | head -1 | grep -qE '^apiVersion:'; then
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG_DATA" | tr -d ' \t\r\n' | base64 -d > "$HOME/.kube/config" 2>/dev/null \
            && [ -s "$HOME/.kube/config" ]; then
            true
          else
            echo "::error::KUBE_CONFIG is not valid. Use base64-encoded kubeconfig or paste raw YAML."
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"
          echo "Using kubectl context: $(kubectl config current-context)"
          kubectl cluster-info

      - name: Create GHCR pull secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No GHCR_TOKEN or GITHUB_TOKEN available for pull secret"
            exit 1
          fi
          kubectl create namespace "${{ env.NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$TOKEN" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Auth0 secrets
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
        run: |
          if [ -n "$AUTH0_DOMAIN" ] && [ -n "$AUTH0_CLIENT_ID" ] && [ -n "$AUTH0_CLIENT_SECRET" ] && [ -n "$AUTH0_SECRET" ]; then
            kubectl create secret generic job-search-web-secrets \
              --from-literal=AUTH0_DOMAIN="$AUTH0_DOMAIN" \
              --from-literal=AUTH0_CLIENT_ID="$AUTH0_CLIENT_ID" \
              --from-literal=AUTH0_CLIENT_SECRET="$AUTH0_CLIENT_SECRET" \
              --from-literal=AUTH0_SECRET="$AUTH0_SECRET" \
              --namespace="${{ env.NAMESPACE }}" \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "Auth0 secrets not set in GitHub; ensure job-search-web-secrets exists in cluster"
          fi

      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          export IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
          export NAMESPACE="${{ env.NAMESPACE }}"

          kubectl apply -f services/job-search-web/k8s/namespace.yaml
          kubectl apply -f services/job-search-web/k8s/configmap.yaml
          kubectl apply -f services/job-search-web/k8s/job-search-web.yaml
          kubectl apply -f services/job-search-web/k8s/ingress.yaml

          kubectl set image deployment/job-search-web \
            job-search-web="${IMAGE_PREFIX}/job-search-web:${IMAGE_TAG}" \
            -n "$NAMESPACE"

          if ! kubectl rollout status deployment/job-search-web -n "$NAMESPACE" --timeout=300s; then
            kubectl get pods -n "$NAMESPACE" -o wide
            kubectl describe pods -n "$NAMESPACE" | tail -80
            kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' | tail -20
            exit 1
          fi

          kubectl get pods,svc,ingress -n "$NAMESPACE"

      - name: Verify health
        run: |
          kubectl run curl-job-search-health \
            --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace="${{ env.NAMESPACE }}" \
            --command -- curl -sf http://job-search-web:3000/api/health
          echo ""
          echo "Deploy complete: http://job-search.dev.stortz.tech/"

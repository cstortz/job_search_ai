apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-search-web
  namespace: job-search
  labels:
    app.kubernetes.io/name: job-search-web
    environment: dev
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    external-dns.alpha.kubernetes.io/hostname: job-search.dev.stortz.tech
spec:
  ingressClassName: nginx
  rules:
    - host: job-search.dev.stortz.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: job-search-web
                port:
                  number: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-search-web
  namespace: job-search
  labels:
    app.kubernetes.io/name: job-search-web
    app.kubernetes.io/component: frontend
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: job-search-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-search-web
        app.kubernetes.io/component: frontend
        environment: dev
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: job-search-web
          image: ghcr.io/cstortz/job_search_ai/job-search-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: job-search-web-config
            - secretRef:
                name: job-search-web-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: job-search-web
  namespace: job-search
  labels:
    app.kubernetes.io/name: job-search-web
spec:
  selector:
    app.kubernetes.io/name: job-search-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
